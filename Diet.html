<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Well-Bell | Diet</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Well-Bell Diet Tracker</h1>
      <p>Track your nutrition, meals, water intake, and health goals</p>
    </header>
    <main>
      <section>
        <h2>User Profile</h2>
        <form>
          <label for="age">Age:</label>
          <input id="age" type="number" name="age" />

          <br /><br />

          <label for="gender">Gender:</label>
          <select id="gender" required>
          <option value="Select Gender" disabled selected>Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="other">Other</option>
          </select>

          <br><br>

        <label for="height">Height (cm)</label>
        <input id="height" type="number" name="height">

        <br><br>

        <label for="Weight">Weight (kg)</label>
        <input id="Weight" type="number" name="Weight">

        <br><br>

        <label for="Activity">Activity level:</label>
        <select id="Activity" required>
          <option value="Select" disabled select>Select</option>
          <option value="low">Low</option>
          <option value="moderate">Moderate</option>
          <option value="high">High</option>
          </select>

          <br><br>

          <label for="allergies">Allergies:</label>
          <input id="allergies" type="text" name="allergies">

          <br><br>


           <label for="likes">Food you like:</label>
          <input id="likes" type="text" name="likes">

          <br><br>


           <label for="Dislikes"> Food you dislike:</label>
          <input id="Dislikes" type="text" name="Dislikes">

          <br><br>

          <label for="diet">Diet prefrence</label>
          <select id="diet" required>
          <option value="Select" disabled select>Select</option>
          <option value="Veg">Veg</option>
          <option value="Non-veg">Non-veg</option>
          <option value="Both">Both</option>
          </select>


          <br><br>

          <button type="submit">Save Profile</button>
           <button type="reset">Edit</button>
        </form>
      </section>

      


    </main>
  </body>
</html>
